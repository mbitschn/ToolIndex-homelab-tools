name: Sync from ToolIndex

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate README and JSON
        env:
          TOOLINDEX_API_URL: ${{ secrets.TOOLINDEX_API_URL }}
        run: node scripts/generate.js

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md tools.json
          git diff --staged --quiet || git commit -m "chore: sync from ToolIndex $(date -u +%Y-%m-%d)"
          git push
